<!doctype html>
<html lang="de">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Listooo - App herunterladen</title>

  <meta name="description"
        content="Listooo ist deine einfache App fuer Einkaufslisten, Ferienlisten und gemeinsame Listen.">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Listooo">
  <meta property="og:locale" content="de_DE">

  <meta property="og:title"
        content="Listooo - Listen einfach gemeinsam nutzen">

  <meta property="og:description"
        content="Einkaufslisten, Ferienlisten und gemeinsame Listen direkt auf deinem Android-Handy.">

  <meta property="og:url"
        content="https://listooo.ch/app/">

  <meta property="og:image"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <meta property="og:image:secure_url"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <meta property="og:image:type"
        content="image/png">

  <meta property="og:image:width"
        content="1200">

  <meta property="og:image:height"
        content="630">

  <meta name="twitter:card"
        content="summary_large_image">

  <meta name="twitter:title"
        content="Listooo - Listen einfach gemeinsam nutzen">

  <meta name="twitter:description"
        content="Einkaufslisten, Ferienlisten und gemeinsame Listen direkt auf deinem Android-Handy.">

  <meta name="twitter:image"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <link rel="icon" href="/assets/favicon.png">

  <style>

    :root {
      color-scheme: light dark;
      --green: #22c55e;
      --green-dark: #0f8a34;
      --text: #151515;
      --muted: #5f6368;
      --surface: #ffffff;
      --page: #f4f5f4;
      --border: rgba(15, 23, 42, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e8f8ec, var(--page) 42%, #e9ecea);
      color: var(--text);
    }

    main {
      width: min(100%, 520px);
      padding: 30px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 18px 55px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    img {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      object-fit: contain;
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(2rem, 7vw, 3.2rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    p {
      margin: 0 auto 24px;
      max-width: 34rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 13px 20px;
      border-radius: 14px;
      background: var(--green);
      color: #ffffff;
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(34, 197, 94, 0.28);
    }

    a:focus-visible {
      outline: 3px solid rgba(34, 197, 94, 0.4);
      outline-offset: 4px;
    }

    small {
      display: block;
      margin-top: 18px;
      color: var(--muted);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f8fafc;
        --muted: #cbd5e1;
        --surface: #181a1f;
        --page: #0f1115;
        --border: rgba(255, 255, 255, 0.12);
      }

      body {
        background: radial-gradient(circle at top, #12351f, var(--page) 44%, #090a0d);
      }

      main {
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
      }
    }

  </style>

  <script>

    const playStoreUrl =
      "https://play.google.com/store/apps/details?id=com.adriano.listooo";

    window.addEventListener("DOMContentLoaded", function () {
      document.getElementById("play-store-link").href = playStoreUrl;

      window.setTimeout(function () {
        window.location.href = playStoreUrl;
      }, 1200);
    });

  </script>

</head>

<body>

  <main>
    <img src="/assets/logo.png" alt="Listooo">

    <h1>Listooo</h1>

    <p>
      Die App fuer Einkaufslisten, Ferienlisten und gemeinsame Listen.
      Einfach teilen, synchronisieren und zusammen erledigen.
    </p>

    <a id="play-store-link"
       href="https://play.google.com/store/apps/details?id=com.adriano.listooo">
      Im Play Store oeffnen
    </a>

    <small>Du wirst automatisch weitergeleitet.</small>
  </main>

</body>

</html>
