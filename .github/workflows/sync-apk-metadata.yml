name: Sync APK metadata

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-apk-metadata.yml
      - scripts/sync_apk_metadata.py
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-apk-metadata
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Read current APK filename from Google Drive
        run: python scripts/sync_apk_metadata.py

      - name: Commit changed APK metadata
        shell: bash
        run: |
          if git diff --quiet -- assets/apk-metadata.json; then
            echo "APK metadata is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/apk-metadata.json
          git commit -m "Update APK metadata"
          git push
