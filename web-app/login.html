<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Listooo anmelden</title>
<meta name="description" content="Anmeldung fuer die zukuenftige Listooo Web-App.">
<link rel="icon" href="/assets/favicon.png">
<style>
:root{
  --bg:#232323;
  --card:#2b2b2b;
  --input:#202126;
  --text:#ffffff;
  --muted:#b9b9b9;
  --accent:#34C759;
  --border:#3a3a3a;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
}

main{
  width:min(100%,460px);
  border:1px solid var(--border);
  border-radius:24px;
  background:var(--card);
  padding:28px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:26px;
}

.brand img{
  width:46px;
  height:46px;
  border-radius:13px;
}

h1{
  margin:0 0 10px;
  font-size:2rem;
  letter-spacing:0;
}

p{
  margin:0 0 22px;
  color:var(--muted);
}

label{
  display:block;
  margin:14px 0 6px;
  color:var(--muted);
  font-weight:700;
}

input{
  width:100%;
  min-height:48px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--input);
  color:var(--text);
  font:inherit;
}

button,
a{
  display:inline-flex;
  width:100%;
  min-height:48px;
  align-items:center;
  justify-content:center;
  margin-top:18px;
  padding:12px 16px;
  border:0;
  border-radius:14px;
  background:var(--accent);
  color:#0b1a10;
  font:inherit;
  font-weight:800;
  text-decoration:none;
}

.secondary{
  margin-top:10px;
  background:transparent;
  color:var(--text);
  border:1px solid var(--border);
}

.note{
  margin-top:16px;
  font-size:.95rem;
  color:var(--muted);
}
</style>
</head>
<body>
<main>
<div class="brand">
<img src="/assets/logo.png" alt="Listooo">
<div>
<strong>Listooo</strong>
<div style="color:var(--muted)">Konto</div>
</div>
</div>

<h1>Anmelden</h1>
<p>Der Login ist vorbereitet. Als naechstes verbinden wir diese Seite mit Firebase Auth und deiner Flutter-Web-App.</p>

<form>
<label for="email">E-Mail</label>
<input id="email" type="email" placeholder="name@example.com" autocomplete="email" disabled>

<label for="password">Passwort</label>
<input id="password" type="password" placeholder="Passwort" autocomplete="current-password" disabled>

<button type="button" disabled>Anmeldung kommt bald</button>
</form>

<a class="secondary" href="/web-app/">Zur Web-App Vorschau</a>
<div class="note">Noch kein echtes Login. Diese Seite ist der sichtbare Platzhalter fuer die naechste Ausbaustufe.</div>
</main>
</body>
</html>
