<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Listooo</title>

<script>

const lang =
(navigator.language || navigator.userLanguage).toLowerCase()

if(lang.startsWith("de")){
  window.location.replace("/index-de.html")
}
else if(lang.startsWith("fr")){
  window.location.replace("/index-fr.html")
}
else if(lang.startsWith("it")){
  window.location.replace("/index-it.html")
}
else if(lang.startsWith("es")){
  window.location.replace("/index-es.html")
}
else{
  window.location.replace("/index-en.html")
}

</script>

<style>
body{
  margin:0;
  background:#111;
}
</style>

</head>
<body>
</body>
</html>
