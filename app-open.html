<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
<title>Listooo – Link öffnen</title>

<meta name="description" content="Öffne die Einladung und synchronisiere deine Liste mit Listooo.">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Listooo">
<meta property="og:locale" content="de_DE">
<meta property="og:title" content="Listooo – Einladung zur Liste">
<meta property="og:description" content="Öffne die Einladung und synchronisiere deine Liste mit Listooo.">
<meta property="og:url" content="https://listooo.ch/">
<meta property="og:image:secure_url" content="https://listooo.ch/assets/og-image.png">
  
  <meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
  
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://listooo.ch/assets/og-image.png">

<style>
    body { font-family: system-ui, Arial, sans-serif; padding: 24px; }
    .box { max-width: 520px; margin: 0 auto; padding: 20px; border: 1px solid #e5e5e5; border-radius: 12px; }
    a.btn { display: inline-block; padding: 12px 16px; border-radius: 8px; text-decoration: none; }
    .primary { background: #16a34a; color: #fff; }
    .secondary { background: #f3f4f6; color: #111827; margin-left: 8px; }
    small { color:#6b7280; display:block; margin-top:8px; }
  </style>
  <script>
    function getCode() {
      const parts = window.location.pathname.split("/");
      return parts[2] || "";
    }

    const code = getCode();

    const intentUrl =
      "intent://invite/" + encodeURIComponent(code) +
      "#Intent;scheme=https;package=com.adriano.listooo;" +
      "S.browser_fallback_url=" +
      encodeURIComponent("https://play.google.com/store/apps/details?id=com.adriano.listooo") +
      ";end";

    window.addEventListener("DOMContentLoaded", function(){
      document.getElementById("open-app").href = intentUrl;
      document.getElementById("open-web").textContent =
        "https://listooo.ch/invite/" + code;

    });
  </script>
</head>
<body>
  <div class="box">
    <h1>Mit Listooo öffnen</h1>
    <p>Wir versuchen, den Link in der Listoo-App zu öffnen.</p>
    <p>
      <a id="open-app" class="btn primary" href="#">In der App öffnen</a>
      <a class="btn secondary" href="https://play.google.com/store/apps/details?id=com.adriano.listooo">App im Play Store</a>
    </p>
    <small>Link: <span id="open-web"></span></small>
  </div>
</body>
</html>
