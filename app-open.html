<!doctype html>
<html lang="de">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Listooo – Einladung zur Liste</title>

  <meta name="description"
        content="Öffne die Einladung und synchronisiere deine Liste mit Listooo.">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Listooo">
  <meta property="og:locale" content="de_DE">

  <meta property="og:title"
        content="Listooo – Einladung zur Liste">

  <meta property="og:description"
        content="Öffne die Einladung und synchronisiere deine Liste mit Listooo.">

  <meta property="og:url"
        content="https://listooo.ch/app-open.html">

  <meta property="og:image"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <meta property="og:image:secure_url"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <meta property="og:image:type"
        content="image/png">

  <meta property="og:image:width"
        content="1200">

  <meta property="og:image:height"
        content="630">

  <meta name="twitter:card"
        content="summary_large_image">

  <meta name="twitter:image"
        content="https://listooo.ch/assets/og-whatsapp.png">

  <style>

    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 24px;
      background: #0f172a;
      color: white;
    }

    .box {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 16px;
      background: #111827;
      border: 1px solid #1f2937;
    }

    a.btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .primary {
      background: #16a34a;
      color: #fff;
    }

    .secondary {
      background: #1f2937;
      color: #fff;
      margin-left: 8px;
    }

    small {
      color: #9ca3af;
      display: block;
      margin-top: 12px;
      word-break: break-all;
    }

  </style>

  <script>

    function getCode() {

      const params =
        new URLSearchParams(window.location.search);

      return params.get("code") || "";
    }

    const code = getCode();

const intentUrl =
  "intent://listooo.ch/app-open.html?code=" +
  encodeURIComponent(code) +
  "#Intent;scheme=https;package=com.adriano.listooo;" +
  "S.browser_fallback_url=" +
  encodeURIComponent(
    "https://play.google.com/store/apps/details?id=com.adriano.listooo"
  ) +
  ";end";

    window.addEventListener("DOMContentLoaded", function () {

      document.getElementById("open-app").href =
        intentUrl;

      document.getElementById("open-web").textContent =
        "https://listooo.ch/app-open.html?code=" + code;
    });

  </script>

</head>

<body>

  <div class="box">

    <h1>Mit Listooo öffnen</h1>

    <p>
      Wir versuchen, den Link direkt in der Listooo-App zu öffnen.
    </p>

    <p>

      <a id="open-app"
         class="btn primary"
         href="#">
         In der App öffnen
      </a>

      <a class="btn secondary"
         href="https://play.google.com/store/apps/details?id=com.adriano.listooo">
         App im Play Store
      </a>

    </p>

  </div>

</body>

</html>
